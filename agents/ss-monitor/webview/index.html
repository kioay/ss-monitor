<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SS Monitor</title>
    <script src="./agent-app-sdk.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --paper: #f4f7f8;
        --surface: #ffffff;
        --ink: #17202a;
        --muted: #62727d;
        --line: #d9e2e7;
        --line-strong: #bfd0d8;
        --signal: #176e56;
        --signal-soft: #e8f4ef;
        --blue: #315f8a;
        --blue-soft: #edf4fa;
        --amber: #b46b15;
        --amber-soft: #fff6e6;
        --red: #b04444;
        --red-soft: #fdeeee;
        --code: #f7f2e7;
        background: var(--paper);
        color: var(--ink);
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: var(--paper); }
      button, input, select, textarea { font: inherit; }
      .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 22px 28px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }
      .brand { min-width: 0; }
      h1 { margin: 0; font-size: 24px; line-height: 1.18; letter-spacing: 0; }
      .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 0 0 auto;
      }
      .status {
        flex: 0 0 auto;
        min-width: 86px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        padding: 8px 12px;
        background: #f8fbfc;
        color: #23404b;
        font-weight: 800;
        text-align: center;
        font-size: 13px;
      }
      .link-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 38px;
        border: 1px solid #b9cbd4;
        border-radius: 8px;
        padding: 0 12px;
        background: #ffffff;
        color: #1c4157;
        font-weight: 900;
        font-size: 13px;
        text-decoration: none;
        white-space: nowrap;
      }
      .link-action:hover { border-color: var(--blue); background: var(--blue-soft); }
      .link-action[aria-disabled="true"] {
        pointer-events: none;
        opacity: 0.55;
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(292px, 380px) minmax(0, 1fr);
        gap: 18px;
        padding: 20px 28px 28px;
      }
      .panel {
        min-width: 0;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }
      .panel h2 {
        margin: 0;
        padding: 16px 18px;
        border-bottom: 1px solid #e3ebef;
        font-size: 16px;
        line-height: 1.2;
      }
      .panel-body { padding: 18px; }
      .field { display: grid; gap: 7px; margin-bottom: 14px; }
      .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .monitor-url-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
      }
      label { color: var(--muted); font-weight: 800; font-size: 13px; }
      legend {
        padding: 0;
        color: var(--muted);
        font-weight: 800;
        font-size: 13px;
      }
      input, select, textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid #c8d5dc;
        border-radius: 8px;
        background: #fbfdfd;
        color: var(--ink);
        outline: none;
      }
      input, select { height: 40px; padding: 0 11px; }
      textarea { min-height: 140px; resize: vertical; padding: 11px; line-height: 1.52; }
      input:focus, select:focus, textarea:focus {
        border-color: #25765d;
        box-shadow: 0 0 0 3px rgba(37, 118, 93, 0.14);
      }
      .project-picker {
        border: 0;
        margin: 0 0 14px;
        padding: 0;
      }
      .check-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .check-option {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        min-height: 40px;
        border: 1px solid #c8d5dc;
        border-radius: 8px;
        padding: 0 10px;
        background: #fbfdfd;
        color: var(--ink);
        cursor: pointer;
      }
      .check-option:focus-within {
        border-color: #25765d;
        box-shadow: 0 0 0 3px rgba(37, 118, 93, 0.14);
      }
      .check-option input {
        width: 16px;
        height: 16px;
        margin: 0;
        border: 1px solid #8ca3ae;
        padding: 0;
        accent-color: #176e56;
        box-shadow: none;
      }
      .toggle {
        display: flex;
        align-items: center;
        gap: 9px;
        min-height: 32px;
        color: #40515b;
        font-size: 13px;
        font-weight: 800;
      }
      .toggle input { width: 16px; height: 16px; }
      .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
      .action {
        height: 42px;
        border: 0;
        border-radius: 8px;
        color: #ffffff;
        font-weight: 900;
        cursor: pointer;
      }
      .action.primary { background: #176e56; }
      .action.secondary { background: #365f89; }
      .action:disabled { cursor: wait; opacity: 0.58; }
      .notice {
        min-height: 42px;
        margin-top: 14px;
        border-radius: 8px;
        padding: 10px 12px;
        border: 1px solid #ecd58c;
        background: #fff9e8;
        color: #705117;
        font-size: 13px;
        line-height: 1.45;
      }
      .run-progress {
        margin-bottom: 18px;
        border-bottom: 1px solid #e3ebef;
        padding-bottom: 16px;
      }
      .run-progress[data-state="idle"] { display: none; }
      .progress-copy {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .progress-title {
        color: var(--ink);
        font-size: 14px;
        font-weight: 900;
      }
      .progress-detail {
        color: var(--muted);
        font-size: 12px;
        text-align: right;
      }
      .step-track {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }
      .step {
        position: relative;
        min-width: 0;
        border-top: 3px solid #d8e2e7;
        padding-top: 8px;
        color: #73818a;
        font-size: 12px;
        font-weight: 800;
      }
      .step::before {
        content: "";
        position: absolute;
        top: -6px;
        left: 0;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #d8e2e7;
      }
      .step.is-active {
        border-color: var(--blue);
        color: #173f62;
      }
      .step.is-active::before { background: var(--blue); }
      .step.is-done {
        border-color: var(--signal);
        color: #176e56;
      }
      .step.is-done::before { background: var(--signal); }
      .run-progress[data-state="error"] .step.is-active {
        border-color: var(--red);
        color: var(--red);
      }
      .run-progress[data-state="error"] .step.is-active::before { background: var(--red); }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
        color: #61717b;
        font-size: 13px;
      }
      .tag {
        border: 1px solid #cfdde3;
        border-radius: 8px;
        padding: 5px 8px;
        background: #f8fbfc;
      }
      .result {
        min-height: 430px;
        white-space: normal;
        line-height: 1.58;
        color: #24313d;
      }
      .empty {
        display: grid;
        place-items: center;
        min-height: 430px;
        border: 1px dashed #c5d2d9;
        border-radius: 8px;
        color: #6b7882;
        text-align: center;
        padding: 24px;
      }
      .summary-report {
        display: grid;
        gap: 18px;
      }
      .summary-hero {
        border-left: 4px solid var(--signal);
        padding: 2px 0 4px 14px;
      }
      .summary-eyebrow {
        margin: 0 0 5px;
        color: #547583;
        font-size: 12px;
        font-weight: 900;
      }
      .summary-hero p {
        margin: 0;
        color: #18222f;
        font-size: 18px;
        line-height: 1.56;
        font-weight: 760;
      }
      .summary-strip {
        display: grid;
        grid-template-columns: minmax(94px, 132px) minmax(0, 1fr);
        gap: 12px;
        border-top: 1px solid #e3ebef;
        padding-top: 14px;
      }
      .summary-strip h3 {
        margin: 0;
        color: #50646f;
        font-size: 13px;
        line-height: 1.35;
      }
      .summary-strip p {
        margin: 0;
        color: #263640;
      }
      .summary-list {
        display: grid;
        gap: 9px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .summary-list li {
        border-left: 3px solid #cbd9df;
        padding-left: 10px;
      }
      .summary-list.ordered {
        counter-reset: action;
      }
      .summary-list.ordered li {
        display: grid;
        grid-template-columns: 26px minmax(0, 1fr);
        align-items: start;
        column-gap: 6px;
        border-left: 0;
        padding-left: 0;
      }
      .summary-list.ordered li::before {
        counter-increment: action;
        content: counter(action);
        display: inline-grid;
        place-items: center;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--signal-soft);
        color: var(--signal);
        font-size: 11px;
        font-weight: 900;
      }
      .summary-list-text {
        display: block;
        min-width: 0;
      }
      .summary-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .summary-badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border: 1px solid #cfdde3;
        border-radius: 999px;
        padding: 0 9px;
        background: #f8fbfc;
        color: #40525d;
        font-size: 12px;
        font-weight: 900;
      }
      .summary-badge.risk-high { background: var(--red-soft); border-color: #efb8b8; color: var(--red); }
      .summary-badge.risk-medium { background: var(--amber-soft); border-color: #edcc9d; color: var(--amber); }
      .summary-badge.risk-low { background: var(--signal-soft); border-color: #b8d7c9; color: var(--signal); }
      .raw-result {
        border-top: 1px solid #e3ebef;
        padding-top: 12px;
      }
      .raw-result summary {
        cursor: pointer;
        color: #50646f;
        font-size: 13px;
        font-weight: 900;
      }
      .raw-result pre {
        max-height: 280px;
        overflow: auto;
        margin: 10px 0 0;
        border: 1px solid #d9e2e7;
        border-radius: 8px;
        padding: 12px;
        background: #fbfdfd;
        color: #24313d;
        white-space: pre-wrap;
        line-height: 1.55;
      }
      code {
        border-radius: 5px;
        padding: 1px 4px;
        background: var(--code);
        color: #7c4d12;
        font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 0.92em;
      }
      .source-link {
        color: inherit;
        cursor: pointer;
        text-decoration: none;
      }
      .source-link:hover code {
        border-color: #d9ba78;
        background: #fff0cc;
        text-decoration: underline;
      }
      strong { font-weight: 900; }
      @media (max-width: 880px) {
        .topbar { align-items: flex-start; flex-direction: column; padding: 20px; }
        .header-actions { width: 100%; }
        .header-actions .status { flex: 1; }
        .layout { grid-template-columns: 1fr; padding: 16px; }
      }
      @media (max-width: 520px) {
        .field-row, .actions { grid-template-columns: 1fr; }
        .monitor-url-row { grid-template-columns: 1fr; }
        .monitor-url-row .link-action { width: 100%; }
        .summary-strip { grid-template-columns: 1fr; }
        .progress-copy { align-items: flex-start; flex-direction: column; }
        .progress-detail { text-align: left; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <h1>SS Monitor</h1>
          <p class="subtitle">舆情风险、来源健康和重点条目</p>
        </div>
        <div class="header-actions">
          <div class="status" id="status">初始化</div>
        </div>
      </header>
      <section class="layout">
        <aside class="panel">
          <h2>监控参数</h2>
          <div class="panel-body">
            <div class="field">
              <label for="monitorBaseUrl">监控地址</label>
              <div class="monitor-url-row">
                <input id="monitorBaseUrl" autocomplete="off" spellcheck="false" />
                <a class="link-action" id="openMonitor" href="#" target="_blank" rel="noopener noreferrer" aria-disabled="true">
                  舆情网页 <span aria-hidden="true">↗</span>
                </a>
              </div>
            </div>
            <div class="field-row">
              <fieldset class="field project-picker" id="gamesGroup">
                <legend>项目</legend>
                <div class="check-group" role="group" aria-label="项目">
                  <label class="check-option">
                    <input class="game-option" data-game-option type="checkbox" name="games" value="ss1" />
                    SS1
                  </label>
                  <label class="check-option">
                    <input class="game-option" data-game-option type="checkbox" name="games" value="ss2" />
                    SS2
                  </label>
                </div>
              </fieldset>
              <div class="field">
                <label for="windowHours">窗口</label>
                <select id="windowHours">
                  <option value="24">24 小时</option>
                  <option value="72">72 小时</option>
                  <option value="168">7 天</option>
                  <option value="336">14 天</option>
                  <option value="720">30 天</option>
                </select>
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="limit">条目上限</label>
                <input id="limit" inputmode="numeric" />
              </div>
              <label class="toggle" for="force">
                <input id="force" type="checkbox" />
                强制刷新
              </label>
            </div>
            <div class="field">
              <label for="extraKeywords">补充关键词</label>
              <input id="extraKeywords" autocomplete="off" />
            </div>
            <div class="field">
              <label for="question">问题</label>
              <textarea id="question"></textarea>
            </div>
            <div class="actions">
              <button class="action primary" id="summary" type="button">生成摘要</button>
              <button class="action secondary" id="health" type="button">检查健康</button>
            </div>
            <div class="notice" id="notice">正在连接 Agent App SDK。</div>
          </div>
        </aside>
        <section class="panel">
          <h2>结果</h2>
          <div class="panel-body">
            <div class="meta" id="meta"></div>
            <div class="run-progress" id="runProgress" data-state="idle" aria-live="polite">
              <div class="progress-copy">
                <span class="progress-title" id="runPhase">等待任务</span>
                <span class="progress-detail" id="runDetail">配置参数后生成摘要</span>
              </div>
              <div class="step-track" aria-label="生成进度">
                <span class="step" data-run-step="submit">提交任务</span>
                <span class="step" data-run-step="fetch">读取数据</span>
                <span class="step" data-run-step="analyze">生成摘要</span>
                <span class="step" data-run-step="publish">整理结果</span>
              </div>
            </div>
            <div class="result" id="result">
              <div class="empty">等待 worker turn</div>
            </div>
          </div>
        </section>
      </section>
    </main>
    <script>
      const defaults = {
        monitorBaseUrl: "http://192.168.8.242:8787",
        games: "ss1,ss2",
        windowHours: "72",
        limit: "200",
        extraKeywords: "",
        force: false,
        question: "请判断当前窗口内是否有需要运营优先处理的舆情风险。",
        lastResult: "",
        taskRunId: "",
        lastMode: ""
      };

      const runSteps = [
        { key: "submit", label: "提交任务" },
        { key: "fetch", label: "读取数据" },
        { key: "analyze", label: "生成摘要" },
        { key: "publish", label: "整理结果" }
      ];

      const summarySections = [
        { key: "conclusion", title: "结论", aliases: ["结论"] },
        { key: "risk", title: "风险", aliases: ["风险"] },
        { key: "source", title: "来源健康", aliases: ["来源健康", "来源"] },
        { key: "items", title: "重点条目", aliases: ["重点条目", "重点"] },
        { key: "advice", title: "建议", aliases: ["建议"] },
        { key: "checks", title: "检查结果", aliases: ["检查结果"] }
      ];

      const appState = {
        busy: false,
        composing: false,
        context: null,
        currentMode: "",
        currentTaskRunId: "",
        currentStep: "",
        permissions: { readOnly: false, scopes: [] },
        progressTimers: [],
        sdk: null,
        uiState: null
      };

      const els = {
        extraKeywords: document.getElementById("extraKeywords"),
        force: document.getElementById("force"),
        gameOptions: Array.from(document.querySelectorAll("[data-game-option]")),
        health: document.getElementById("health"),
        limit: document.getElementById("limit"),
        meta: document.getElementById("meta"),
        monitorBaseUrl: document.getElementById("monitorBaseUrl"),
        notice: document.getElementById("notice"),
        openMonitor: document.getElementById("openMonitor"),
        question: document.getElementById("question"),
        result: document.getElementById("result"),
        runDetail: document.getElementById("runDetail"),
        runPhase: document.getElementById("runPhase"),
        runProgress: document.getElementById("runProgress"),
        runSteps: Array.from(document.querySelectorAll("[data-run-step]")),
        status: document.getElementById("status"),
        summary: document.getElementById("summary"),
        windowHours: document.getElementById("windowHours")
      };

      init();

      async function init() {
        try {
          if (!window.WDCloudAgentApp || typeof window.WDCloudAgentApp.connectAgentApp !== "function") {
            throw new Error("Agent App SDK 未加载。");
          }
          appState.sdk = await window.WDCloudAgentApp.connectAgentApp({
            clientEventIdPrefix: "ss-monitor-agent"
          });
          appState.context = await appState.sdk.context();
          appState.permissions = await appState.sdk.permissions.load();
          appState.uiState = await appState.sdk.state.create({
            storageKey: `ss-monitor:${appState.context?.sessionId || "session"}`,
            defaults,
            fields: {
              monitorBaseUrl: { sync: "persistent" },
              games: { sync: "persistent" },
              windowHours: { sync: "persistent" },
              limit: { sync: "persistent" },
              extraKeywords: { sync: "persistent" },
              force: { sync: "local" },
              question: { sync: "local" },
              lastResult: { sync: "persistent" },
              taskRunId: { sync: "persistent" },
              lastMode: { sync: "persistent" }
            }
          });
          appState.uiState.subscribe((next) => {
            renderFromState(next);
          });
          await restoreResultFromSnapshot();
          bindEvents();
          setStatus("已就绪");
          const issue = submitPermissionIssue();
          if (issue) {
            showNotice(issue);
            setButtonsDisabled(true);
          } else {
            showNotice("SDK 已连接。");
          }
        } catch (error) {
          setStatus("加载失败");
          showNotice(error.message || String(error));
        }
      }

      async function restoreResultFromSnapshot() {
        if (!appState.sdk?.session?.snapshot || !appState.uiState) return;
        let snapshot;
        try {
          snapshot = await appState.sdk.session.snapshot();
        } catch {
          return;
        }
        const hasActiveContext = Boolean(
          appState.context?.activeTaskRunId ||
          appState.context?.activeTurnId ||
          appState.context?.activeResultId ||
          snapshot?.activeTaskRunId ||
          snapshot?.activeTurnId ||
          snapshot?.activeResultId
        );
        const result = pickRestorableResult(snapshot, hasActiveContext);
        const restored = resultTextFromAgentResult(result);
        if (!restored) return;
        const taskRunId = result?.taskRunId || snapshot?.activeTaskRunId || appState.context?.activeTaskRunId || "";
        const current = appState.uiState.get();
        if (!hasActiveContext && current.lastResult) return;
        if (hasActiveContext && current.taskRunId && taskRunId && current.taskRunId === taskRunId && current.lastResult) return;
        appState.uiState.patch({
          lastMode: inferModeFromResult(result),
          lastResult: restored,
          taskRunId
        }, {
          save: !hasActiveContext,
          source: hasActiveContext ? "snapshot-active-result" : "snapshot-latest-result"
        });
        if (!hasActiveContext) {
          await appState.uiState.flush?.();
        }
        showNotice(hasActiveContext ? "已恢复当前计划任务结果。" : "已恢复最近一次结果。");
      }

      function pickRestorableResult(snapshot, preferActive) {
        if (!snapshot || typeof snapshot !== "object") return null;
        if (preferActive && snapshot.activeResult && typeof snapshot.activeResult === "object") return snapshot.activeResult;
        const contextTaskRunId = appState.context?.activeTaskRunId || snapshot.activeTaskRunId || "";
        const candidates = [
          ...(Array.isArray(snapshot.results) ? snapshot.results : []),
          ...(Array.isArray(snapshot.recentResults) ? snapshot.recentResults : []),
          snapshot.latestResult
        ].filter((item) => item && typeof item === "object");
        if (contextTaskRunId) {
          const matched = candidates.find((item) => item.taskRunId === contextTaskRunId);
          if (matched) return matched;
        }
        return snapshot.latestResult || candidates[candidates.length - 1] || null;
      }

      function resultTextFromAgentResult(result) {
        if (!result || typeof result !== "object") return "";
        const structured = result.structuredResult && typeof result.structuredResult === "object" ? result.structuredResult : {};
        return String(structured.resultMarkdown || structured.finalMessage || structured.summary || result.summary || "").trim();
      }

      function inferModeFromResult(result) {
        const structured = result?.structuredResult && typeof result.structuredResult === "object" ? result.structuredResult : {};
        const mode = String(structured.mode || result?.mode || "").trim();
        return mode === "monitor.health" || mode === "monitor.summary" ? mode : "monitor.summary";
      }

      function bindEvents() {
        bindInput("monitorBaseUrl", { save: true });
        els.monitorBaseUrl.addEventListener("input", updateMonitorLink);
        els.openMonitor.addEventListener("click", (event) => {
          if (els.openMonitor.getAttribute("aria-disabled") === "true") event.preventDefault();
        });
        els.result.addEventListener("click", bindSourceLinkClicks);
        els.gameOptions.forEach((option) => {
          option.addEventListener("change", () => {
            appState.uiState?.set("games", selectedGames().join(","), { save: true });
          });
        });
        bindInput("limit", { save: true });
        bindInput("extraKeywords", { save: true });
        els.windowHours.addEventListener("change", () => appState.uiState?.set("windowHours", els.windowHours.value));
        els.force.addEventListener("change", () => appState.uiState?.set("force", els.force.checked));
        els.question.addEventListener("compositionstart", () => {
          appState.composing = true;
        });
        els.question.addEventListener("compositionend", () => {
          appState.composing = false;
          appState.uiState?.set("question", els.question.value, { save: false });
        });
        els.question.addEventListener("input", () => appState.uiState?.set("question", els.question.value, { save: false }));
        els.summary.addEventListener("click", () => submitTurn("monitor.summary"));
        els.health.addEventListener("click", () => submitTurn("monitor.health"));
      }

      function bindInput(key, options = {}) {
        els[key].addEventListener("input", () => {
          appState.uiState?.set(key, els[key].value, { save: options.save !== false });
        });
      }

      function bindSourceLinkClicks(event) {
        const link = event.target.closest?.("a.source-link");
        if (!link || event.defaultPrevented || event.button !== 0) return;
        if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
        event.preventDefault();
        openExternalLink(link.href);
      }

      function openExternalLink(href) {
        let url;
        try {
          url = new URL(href);
          if (!["http:", "https:"].includes(url.protocol)) return;
        } catch {
          return;
        }
        const opened = window.open(url.href, "_blank");
        if (opened) {
          opened.opener = null;
          return;
        }
        window.location.assign(url.href);
      }

      function submitPermissionIssue() {
        if (appState.permissions.readOnly) {
          return "当前共享页为只读权限。";
        }
        const scopes = Array.isArray(appState.permissions.scopes) ? appState.permissions.scopes : [];
        const hasSubmitScope = ["session.turns.create", "session.actions.submit"].some((scope) =>
          scopes.includes(scope) || appState.sdk?.permissions?.can(scope) === true
        );
        if (!hasSubmitScope) {
          return `当前 WebView token 缺少提交权限：session.turns.create / session.actions.submit。`;
        }
        return "";
      }

      async function submitTurn(mode) {
        if (appState.busy) return;
        const issue = submitPermissionIssue();
        if (issue) {
          showNotice(issue);
          return;
        }
        if (!selectedGames().length) {
          showNotice("请选择项目");
          return;
        }
        if (!appState.sdk?.session?.submitTurnAndWaitForResult) {
          showNotice("当前 SDK 不支持 submitTurnAndWaitForResult。");
          return;
        }
        setBusy(true);
        try {
          const input = readForm(mode);
          appState.currentMode = mode;
          appState.currentTaskRunId = "";
          setRunProgress("submit", "正在提交任务", "running");
          scheduleProgressCues(mode);
          appState.uiState?.patch({ ...input, lastMode: mode });
          setStatus("worker 运行中");
          showNotice("已提交 worker turn。");
          const waited = await appState.sdk.session.submitTurnAndWaitForResult({
            title: mode === "monitor.health" ? "SS Monitor health" : "SS Monitor summary",
            content: input.question || "SS Monitor",
            input,
            idempotencyKey: `ss-monitor:${mode}:${Date.now()}:${Math.random().toString(36).slice(2)}`
          }, {
            intervalMs: 1600,
            timeoutMs: 240000,
            structuredMode: mode,
            onSubmitted: (submitted) => {
              const taskRunId = extractTaskRunId(submitted);
              if (taskRunId) {
                appState.currentTaskRunId = taskRunId;
                appState.uiState?.set("taskRunId", taskRunId);
              }
              setRunProgress("fetch", taskRunId ? `任务 ${shortId(taskRunId)} 已创建` : "worker 正在排队", "running");
              renderMeta();
            },
            onPoll: (detail) => {
              updateProgressFromDetail(detail, mode);
              renderMeta(detail);
            }
          });
          const structured = waited.structuredResult || {};
          const lastResult = structured.resultMarkdown || structured.finalMessage || "worker 已完成。";
          const taskRunId = extractTaskRunId(waited.submitResponse) || appState.uiState?.get("taskRunId") || "";
          appState.uiState?.patch({ lastResult, taskRunId, lastMode: mode });
          await appState.uiState?.flush();
          setRunProgress("publish", "结果已整理完成", "done");
          setStatus("已完成");
          showNotice("结果已保存。");
        } catch (error) {
          setRunProgress(appState.currentStep || "submit", error.message || String(error), "error");
          setStatus("失败");
          showNotice(error.message || String(error));
        } finally {
          setBusy(false);
        }
      }

      function readForm(mode) {
        return {
          mode,
          monitorBaseUrl: els.monitorBaseUrl.value.trim(),
          games: selectedGames().join(","),
          windowHours: Number(els.windowHours.value) || 72,
          limit: clampNumber(els.limit.value, 1, 1000, 200),
          extraKeywords: els.extraKeywords.value.trim(),
          force: els.force.checked,
          question: els.question.value.trim()
        };
      }

      function renderFromState(state) {
        syncValue("monitorBaseUrl", state.monitorBaseUrl || defaults.monitorBaseUrl);
        updateMonitorLink();
        syncGames(Object.prototype.hasOwnProperty.call(state, "games") ? state.games : defaults.games);
        syncValue("limit", state.limit || defaults.limit);
        syncValue("extraKeywords", state.extraKeywords || "");
        if (els.windowHours.value !== String(state.windowHours || defaults.windowHours)) {
          els.windowHours.value = String(state.windowHours || defaults.windowHours);
        }
        if (els.force.checked !== Boolean(state.force)) {
          els.force.checked = Boolean(state.force);
        }
        if (document.activeElement !== els.question && !appState.composing && els.question.value !== (state.question || "")) {
          els.question.value = state.question || defaults.question;
        }
        renderResult(state);
      }

      function syncValue(key, value) {
        if (document.activeElement === els[key]) return;
        if (els[key].value !== String(value)) els[key].value = String(value);
      }

      function updateMonitorLink() {
        const href = monitorPageUrl();
        if (!href) {
          els.openMonitor.href = "#";
          els.openMonitor.setAttribute("aria-disabled", "true");
          return;
        }
        els.openMonitor.href = href;
        els.openMonitor.removeAttribute("aria-disabled");
      }

      function monitorPageUrl() {
        try {
          const url = new URL((els.monitorBaseUrl.value || defaults.monitorBaseUrl).trim());
          if (!["http:", "https:"].includes(url.protocol) || url.username || url.password || !url.host) return "";
          url.hash = "";
          return url.href.replace(/\/$/, "");
        } catch {
          return "";
        }
      }

      function selectedGames() {
        return els.gameOptions.filter((option) => option.checked).map((option) => option.value);
      }

      function syncGames(value) {
        const selected = new Set(String(value || "").split(",").map((item) => item.trim().toLowerCase()).filter(Boolean));
        els.gameOptions.forEach((option) => {
          const nextChecked = selected.has(option.value);
          if (option.checked !== nextChecked) option.checked = nextChecked;
        });
      }

      function setRunProgress(stepKey, detail, state = "running") {
        const normalizedStep = runSteps.some((step) => step.key === stepKey) ? stepKey : "submit";
        appState.currentStep = normalizedStep;
        const activeIndex = stepIndex(normalizedStep);
        els.runProgress.dataset.state = state;
        els.runPhase.textContent = state === "done" ? "生成完成" : state === "error" ? "生成失败" : runSteps[activeIndex].label;
        els.runDetail.textContent = detail || "";
        els.runSteps.forEach((node, index) => {
          node.classList.toggle("is-done", state === "done" || index < activeIndex);
          node.classList.toggle("is-active", state !== "done" && index === activeIndex);
        });
      }

      function stepIndex(stepKey) {
        return Math.max(0, runSteps.findIndex((step) => step.key === stepKey));
      }

      function scheduleProgressCues(mode) {
        clearProgressTimers();
        const cues = mode === "monitor.health"
          ? [
              { delay: 1200, step: "fetch", detail: "正在检查健康接口" },
              { delay: 3600, step: "publish", detail: "正在整理健康结果" }
            ]
          : [
              { delay: 1200, step: "fetch", detail: "正在读取监控窗口" },
              { delay: 5200, step: "analyze", detail: "正在归纳风险与重点条目" },
              { delay: 14000, step: "publish", detail: "正在整理摘要格式" }
            ];
        appState.progressTimers = cues.map((cue) => window.setTimeout(() => {
          if (!appState.busy) return;
          if (stepIndex(appState.currentStep) < stepIndex(cue.step)) {
            setRunProgress(cue.step, cue.detail, "running");
          }
        }, cue.delay));
      }

      function clearProgressTimers() {
        appState.progressTimers.forEach((timer) => window.clearTimeout(timer));
        appState.progressTimers = [];
      }

      function updateProgressFromDetail(detail, mode) {
        const turn = currentTurnFromDetail(detail);
        if (!turn) return;
        const text = [
          turn.stage,
          turn.phaseMessage,
          turn.phase,
          turn.status,
          turn.message
        ].filter(Boolean).join(" ").toLowerCase();
        const label = turn.phaseMessage || turn.message || turn.stage || turn.status || "";
        if (/publish|upload|artifact|result|complete|succeed/.test(text)) {
          setRunProgress("publish", label || "正在整理结果", "running");
        } else if (/codex|analy|summary|摘要/.test(text) || (mode === "monitor.summary" && /running/.test(text))) {
          setRunProgress("analyze", label || "正在生成摘要", "running");
        } else if (/collect|fetch|health|config|monitor|读取|检查/.test(text)) {
          setRunProgress("fetch", label || "正在读取数据", "running");
        }
      }

      function currentTurnFromDetail(detail) {
        if (!detail || !Array.isArray(detail.turns)) return null;
        const taskRunId = appState.currentTaskRunId || appState.uiState?.get("taskRunId") || "";
        if (taskRunId) {
          const matched = detail.turns.find((turn) => turn && turn.taskRunId === taskRunId);
          if (matched) return matched;
        }
        return detail.turns[detail.turns.length - 1] || null;
      }

      function renderResult(state = appState.uiState?.get() || {}) {
        renderMeta();
        if (!state.lastResult) {
          els.result.innerHTML = '<div class="empty">等待 worker turn</div>';
          return;
        }
        els.result.innerHTML = renderSummaryReport(parseSummaryMarkdown(state.lastResult));
      }

      function parseSummaryMarkdown(markdown) {
        const lines = String(markdown || "").replace(/\r/g, "").split("\n");
        const runtimeStart = lines.findIndex((line) => /^##\s*Runtime/i.test(line.trim()));
        const bodyLines = runtimeStart >= 0 ? lines.slice(0, runtimeStart) : lines;
        const runtimeLines = runtimeStart >= 0 ? lines.slice(runtimeStart + 1) : [];
        const sections = Object.fromEntries(summarySections.map((section) => [section.key, { ...section, body: [], items: [] }]));
        const intro = [];
        let current = "";

        for (const rawLine of bodyLines) {
          const trimmed = rawLine.trim();
          if (!trimmed || /^#\s+SS Monitor Result/i.test(trimmed) || /^_Generated at/i.test(trimmed)) continue;
          const text = stripListMarker(trimmed.replace(/^#+\s*/, ""));
          const section = matchSummarySection(text);
          if (section) {
            current = section.key;
            if (section.rest) sections[current].body.push(section.rest);
            continue;
          }
          if (current) {
            const target = isListLine(trimmed) || ["items", "advice", "checks"].includes(current) ? "items" : "body";
            sections[current][target].push(text);
          } else {
            intro.push(text);
          }
        }

        return {
          intro,
          raw: markdown,
          runtime: parseRuntimeLines(runtimeLines),
          sections,
        };
      }

      function matchSummarySection(text) {
        const normalized = stripInlineMarkers(text).trim();
        for (const section of summarySections) {
          for (const alias of section.aliases) {
            const exact = normalized === alias;
            const withColon = normalized.match(new RegExp(`^${escapeRegExp(alias)}\\s*[:：]\\s*(.*)$`));
            if (exact) return { key: section.key, rest: "" };
            if (withColon) return { key: section.key, rest: withColon[1].trim() };
          }
        }
        return null;
      }

      function renderSummaryReport(parsed) {
        const sections = parsed.sections;
        const conclusion = firstContent(sections.conclusion) || parsed.intro.join(" ");
        const risk = firstContent(sections.risk);
        const source = firstContent(sections.source);
        const runtimeBadges = Object.entries(parsed.runtime).slice(0, 3).map(([key, value]) => `${key}: ${value}`);
        const badges = [
          riskBadge(risk),
          source ? { label: shortPlainText(source, 34), className: "summary-badge" } : null,
          ...runtimeBadges.map((label) => ({ label, className: "summary-badge" }))
        ].filter(Boolean);
        const sectionHtml = [
          renderSection(sections.risk),
          renderSection(sections.source),
          renderSection(sections.items),
          renderSection(sections.advice, { ordered: true }),
          renderSection(sections.checks)
        ].filter(Boolean).join("");
        return `
          <article class="summary-report">
            <section class="summary-hero">
              <p class="summary-eyebrow">结论</p>
              <p>${inlineMarkdown(conclusion || "暂无摘要结果。")}</p>
            </section>
            ${badges.length ? `<div class="summary-badges">${badges.map((badge) => `<span class="${badge.className}">${escapeHtml(badge.label)}</span>`).join("")}</div>` : ""}
            ${sectionHtml}
            <details class="raw-result">
              <summary>原始结果</summary>
              <pre>${escapeHtml(parsed.raw)}</pre>
            </details>
          </article>
        `;
      }

      function renderSection(section, options = {}) {
        if (!section || !sectionHasContent(section)) return "";
        const body = section.body.map((line) => `<p>${inlineMarkdown(line)}</p>`).join("");
        const items = section.items.length
          ? `<ul class="summary-list${options.ordered ? " ordered" : ""}">${section.items.map((item) => `<li><span class="summary-list-text">${inlineMarkdown(item)}</span></li>`).join("")}</ul>`
          : "";
        return `
          <section class="summary-strip">
            <h3>${escapeHtml(section.title)}</h3>
            <div>${body}${items}</div>
          </section>
        `;
      }

      function sectionHasContent(section) {
        return section.body.some(Boolean) || section.items.some(Boolean);
      }

      function firstContent(section) {
        if (!section) return "";
        return section.body.find(Boolean) || section.items.find(Boolean) || "";
      }

      function riskBadge(text) {
        const plain = stripInlineMarkers(text || "").toLowerCase();
        if (!plain) return null;
        if (/^(high|高风险|严重)/.test(plain)) return { label: "高风险", className: "summary-badge risk-high" };
        if (/^(medium|中风险|中等)/.test(plain)) return { label: "中风险", className: "summary-badge risk-medium" };
        if (/^(low|低风险|轻微)/.test(plain)) return { label: "低风险", className: "summary-badge risk-low" };
        if (/(high|高风险|严重)/.test(plain)) return { label: "高风险", className: "summary-badge risk-high" };
        if (/(medium|中风险|中等)/.test(plain)) return { label: "中风险", className: "summary-badge risk-medium" };
        if (/(low|低风险|轻微)/.test(plain)) return { label: "低风险", className: "summary-badge risk-low" };
        return { label: shortPlainText(text, 24), className: "summary-badge" };
      }

      function parseRuntimeLines(lines) {
        const runtime = {};
        for (const line of lines) {
          const text = stripListMarker(line.trim());
          const match = text.match(/^([^:：]+)[:：]\s*(.+)$/);
          if (match) runtime[match[1].trim()] = stripInlineMarkers(match[2].trim());
        }
        return runtime;
      }

      function stripListMarker(value) {
        return String(value || "").replace(/^[-*]\s+/, "").replace(/^\d+[.、]\s*/, "").trim();
      }

      function isListLine(value) {
        return /^[-*]\s+/.test(value.trim()) || /^\d+[.、]\s*/.test(value.trim());
      }

      function stripInlineMarkers(value) {
        return String(value || "").replace(/\*\*/g, "").replace(/`/g, "").trim();
      }

      function inlineMarkdown(value) {
        const text = String(value || "");
        const tokenPattern = /`([^`]+)`|\*\*([^*]+)\*\*/g;
        let html = "";
        let lastIndex = 0;
        for (const match of text.matchAll(tokenPattern)) {
          html += autolinkSourceItems(text.slice(lastIndex, match.index));
          if (match[1] !== undefined) {
            html += sourceItemCodeHtml(match[1]);
          } else {
            html += `<strong>${autolinkSourceItems(match[2])}</strong>`;
          }
          lastIndex = match.index + match[0].length;
        }
        html += autolinkSourceItems(text.slice(lastIndex));
        return html;
      }

      function autolinkSourceItems(value) {
        return escapeHtml(value).replace(/\b(?:tieba|forum4399|bilibili|douyin):[A-Za-z0-9_-]+\b/gi, (sourceId) => {
          return sourceItemLinkHtml(sourceId, `<code>${sourceId}</code>`) || sourceId;
        });
      }

      function sourceItemCodeHtml(codeText) {
        const codeHtml = `<code>${escapeHtml(codeText)}</code>`;
        return sourceItemLinkHtml(codeText, codeHtml) || codeHtml;
      }

      function sourceItemLinkHtml(sourceId, innerHtml) {
        const href = sourceItemUrl(sourceId);
        if (!href) return "";
        return `<a class="source-link" href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer" title="打开原帖">${innerHtml}</a>`;
      }

      function sourceItemUrl(codeText) {
        const text = String(codeText || "").trim();
        const match = text.match(/^(tieba|forum4399|bilibili|douyin):([A-Za-z0-9_-]+)$/i);
        if (!match) return "";
        const source = match[1].toLowerCase();
        const id = match[2];
        if (source === "tieba") return `https://tieba.baidu.com/p/${encodeURIComponent(id)}`;
        if (source === "forum4399") return `https://my.4399.com/forums/thread-${encodeURIComponent(id)}`;
        if (source === "bilibili") return `https://www.bilibili.com/video/${encodeURIComponent(id)}/`;
        if (source === "douyin") return `https://www.douyin.com/video/${encodeURIComponent(id)}`;
        return "";
      }

      function shortPlainText(value, maxLength) {
        const text = stripInlineMarkers(value).replace(/[。！？!?，,；;.]+$/u, "");
        return text.length > maxLength ? `${text.slice(0, maxLength - 1)}…` : text;
      }

      function escapeRegExp(value) {
        return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function renderMeta(detail) {
        const state = appState.uiState?.get() || {};
        const tags = [];
        if (appState.context?.agentId) tags.push(`agent ${appState.context.agentId}`);
        if (state.lastMode) tags.push(state.lastMode);
        if (state.taskRunId) tags.push(`task ${shortId(state.taskRunId)}`);
        if (detail?.turns?.length) tags.push(`${detail.turns.length} turns`);
        els.meta.innerHTML = tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
      }

      function extractTaskRunId(value) {
        if (!value || typeof value !== "object") return "";
        return value.taskRunId || value.task?.taskRunId || value.turn?.taskRunId || "";
      }

      function clampNumber(value, min, max, fallback) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) return fallback;
        return Math.max(min, Math.min(max, Math.trunc(parsed)));
      }

      function shortId(value) {
        const text = String(value || "");
        return text.length > 18 ? `${text.slice(0, 8)}...${text.slice(-6)}` : text;
      }

      function setBusy(nextBusy) {
        appState.busy = nextBusy;
        if (!nextBusy) clearProgressTimers();
        setButtonsDisabled(nextBusy || Boolean(submitPermissionIssue()));
      }

      function setButtonsDisabled(disabled) {
        els.summary.disabled = disabled;
        els.health.disabled = disabled;
      }

      function setStatus(text) {
        els.status.textContent = text;
      }

      function showNotice(text) {
        els.notice.textContent = text;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[char]);
      }
    </script>
  </body>
</html>
