id: ss-monitor
name: SS Monitor
version: 0.1.3
summary: WDCloud Agent App entry for SS Monitor sentiment monitoring summaries.
codexModel: gpt-5.4-mini
ownerTeam: self
project: SS Monitor
department: Operations
tags:
  - WDCloud
  - Agent App
  - Sentiment Monitor
runtime:
  mode: per-task-job
  sessionBinding: task-run
  sharingPolicy: task-isolated
  workerCommand:
    - python3
    - /agent/worker/worker.py
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
jobPolicy:
  timeoutMinutes: 10
  retryLimit: 0
  ttlAfterFinishedMinutes: 30
  artifactRetentionDays: 7
networkRequests:
  - https://wdclaw-artifacts-dev.oss-cn-hangzhou.aliyuncs.com
  - http://192.168.8.242:8787
ui:
  mode: web-view-app
  entryArtifactId: webviewBundle
  entry: index.html
  defaultSurface: app
  fallback: task-detail
webView:
  version: 1
  sourceDir: webview
  buildCommand: npm run build
  entryArtifactId: webviewBundle
  entry: index.html
  bootstrap: app-scoped-token
  transport: sdk
  apiScopes:
    - app.context.read
    - task.status.read
    - session.events.read
    - session.presence.read
    - session.presence.write
    - session.actions.read
    - session.actions.submit
    - session.turns.create
    - session.state.read
    - session.state.write
  maxBundleBytes: 10485760
  maxRuntimeMemoryMb: 256
invocation:
  version: 1
  defaultAction: monitor.summary
  actions:
    - id: monitor.summary
      title: 生成 SS Monitor 舆情摘要
      description: 读取 SS Monitor 健康、配置和监控数据，生成可直接回复到钉钉或计划任务通知的中文舆情摘要。
      inputDefaults:
        mode: monitor.summary
        monitorBaseUrl: http://192.168.8.242:8787
        games: ss1,ss2
        windowHours: 72
        limit: 200
      inputSchema:
        type: object
        additionalProperties: true
        properties:
          mode:
            type: string
            description: 业务模式；默认 monitor.summary。
          monitorBaseUrl:
            type: string
            description: SS Monitor 服务地址；默认使用平台内网监控服务。
          games:
            type: string
            description: 逗号分隔的 game id，例如 ss1,ss2。
          windowHours:
            type: integer
            description: 监控窗口小时数。
            minimum: 1
            maximum: 720
          limit:
            type: integer
            description: 最多读取的监控条目数。
            minimum: 1
            maximum: 1000
          extraKeywords:
            type: string
            description: 临时关注关键词。
          question:
            type: string
            description: 用户希望本次摘要重点回答的问题。
          message:
            type: string
            description: 兼容钉钉或外部调用传入的自然语言需求；调用方可映射为 question。
          force:
            type: boolean
            description: 是否强制刷新监控数据。
          channelContext:
            type: object
            additionalProperties: true
      resultMapping:
        textPath:
          - $.finalMessage
          - $.resultMarkdown
        summaryPath:
          - $.finalMessage
          - $.resultMarkdown
    - id: monitor.health
      title: 检查 SS Monitor 数据源健康
      description: 检查 SS Monitor health/config 可用性、缓存与数据源状态，输出健康诊断。
      inputDefaults:
        mode: monitor.health
        monitorBaseUrl: http://192.168.8.242:8787
        games: ss1,ss2
      inputSchema:
        type: object
        additionalProperties: true
        properties:
          mode:
            type: string
            description: 业务模式；默认 monitor.health。
          monitorBaseUrl:
            type: string
            description: SS Monitor 服务地址；默认使用平台内网监控服务。
          games:
            type: string
            description: 逗号分隔的 game id，例如 ss1,ss2。
          channelContext:
            type: object
            additionalProperties: true
      resultMapping:
        textPath:
          - $.finalMessage
          - $.resultMarkdown
        summaryPath:
          - $.finalMessage
          - $.resultMarkdown
smoke:
  payload: smoke/payload.json
  expectedArtifacts:
    - webviewBundle
    - manifest
    - logs
